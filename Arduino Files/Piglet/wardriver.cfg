

# ============================================================
# Piglet Wardriver Configuration
# Target: Waveshare ESP32-C6 LCD 1.47"
# Format: key=value
#
# Lines starting with # are comments and ignored.
# ============================================================


# ------------------------------------------------------------
# WiGLE Upload
# ------------------------------------------------------------
# Use Only the "Encoded for Use" token
# Get it here: https://wigle.net/account
# Leave empty to disable WiGLE uploads.

wigleBasicToken=EnterWigleTokenForUseTokenHere


# ------------------------------------------------------------
# WatchDogGoWars
# ------------------------------------------------------------
# Get your API key here: https://wdgwars.pl/profile/
# Add your API Key Below


wdgwarsApiKey=EnterWatchDogsGoAPITokenHere

# ------------------------------------------------------------
# Max Automatic Uploads
# ------------------------------------------------------------
# Values are True or False
# This will set a max for uploads on WatchdogsGoWars as well as Wigle
# -1 = Uploads ALL pending files Everyboot
#  0 = Disabled - No Auto-Upload at boot, you will manually pull the files off SD card OR use the web interface to upload files
#  1-100 = Entering any value from 1 to 100 will be the cap for how many uploads it will auto upload.  ie if you put 25, it will only upload 25 files at a time.

maxBootUploads=-1



# ------------------------------------------------------------
# Home Wi-Fi (STA mode)
# ------------------------------------------------------------
# If provided, device will attempt to connect on boot.
# If connection fails, it falls back to SoftAP for 60 seconds.

homeSsid=EnterWifiHere
homePsk=EnterWifiPasswordHere


# ------------------------------------------------------------
# Wardriver Access Point (SoftAP fallback)
# ------------------------------------------------------------
# SSID and password for the temporary config AP.
# Password must be ≥8 characters or AP becomes open.
wardriverSsid=Piglet-WARDRIVE
wardriverPsk=wardrive1234


# ------------------------------------------------------------
# GPS Settings
# ------------------------------------------------------------
# UART baud rate for the GPS module.
# Allowed: 4800, 9600, 19200, 38400, 57600, 115200 (others rejected with warning).
gpsBaud=9600

# Try common bauds at boot if the configured one isn't producing NMEA.
# Detected baud overrides gpsBaud for the session only — never written back.
# Set to false if you have an unusual GPS that misbehaves on autodetect probes.
gpsAutodetect=true

# Max age (ms) of GPS date+time before CSV row timestamps fall back to the
# system clock. Lower = stricter; higher = more tolerant of brief GPS dropouts.
# Range 1000..600000.
gpsFixAgeMaxMs=15000


# ------------------------------------------------------------
# Wi-Fi Scan Mode
# ------------------------------------------------------------
# aggressive  → scans every ~4.5 seconds (faster discovery, more power use)
# powersaving → scans every ~12 seconds (slower, less power)

scanMode=aggressive


# ------------------------------------------------------------
# Speed Units (display only)
# ------------------------------------------------------------
# kmh → kilometers per hour
# mph → miles per hour

speedUnits=mph


# ------------------------------------------------------------
# battery Test
# ------------------------------------------------------------
#Values are True or False
#Will print seconds active when on battery power

batteryTest=false

# ------------------------------------------------------------
# Device Name
# ------------------------------------------------------------
# Optional.  Alphanumeric, hyphens and underscores only (max 20 chars).
# This value is appended to the WiGLE CSV header device field and
# prepended to the filename so multiple wardrivers uploading to the
# same account can be distinguished.
#
# Examples:
#   deviceName=rover1        -> device=Piglet-rover1       / rover1_Piglet_WiGLE_....csv
#   deviceName=backpack-2    -> device=Piglet-backpack-2   / backpack-2_Piglet_WiGLE_....csv
# Leave empty (or remove) for the default: device=Piglet-Wardriver

deviceName=


# ------------------------------------------------------------
# Mesh Mode On Boot
# ------------------------------------------------------------
# Automatically enter ESP-Now mesh mode after boot uploads complete.
# Bypasses the SoftAP window and jumps directly to the mesh page.
#
#   none = Normal wardriving mode (default)
#   core = Start as Mesh Core (coordinator) — logs data from nodes
#   node = Start as Mesh Node — forwards scan results to a Core
#
# Requires a compatible coordinator (Biscuit Pro, JCMK C5 Wardriver)
# when using node mode.

meshModeOnBoot=none
